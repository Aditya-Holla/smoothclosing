name: Morning Lead Pipeline

on:
  schedule:
    # Runs at 8 AM Central Time (14:00 UTC) every day
    - cron: '0 14 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Install Tesseract OCR
        run: sudo apt-get install -y tesseract-ocr

      - name: Restore pipeline state
        # pipeline_state.json is committed to git so incremental processing works
        # input_pdfs/ is cached between runs so we don't re-download everything
        uses: actions/cache@v4
        with:
          path: input_pdfs
          key: input-pdfs-${{ github.run_number }}
          restore-keys: input-pdfs-

      - name: Set up Google OAuth token
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json
          echo '${{ secrets.GOOGLE_TOKEN_JSON }}' > token.json

      - name: Download new PDFs
        env:
          RENTCAST_API_KEY: ${{ secrets.RENTCAST_API_KEY }}
        run: python county_downloader.py

      - name: Run full pipeline (extract → equity → skip trace → Google Sheet)
        env:
          RENTCAST_API_KEY: ${{ secrets.RENTCAST_API_KEY }}
          SKIPGENIE_USERNAME: ${{ secrets.SKIPGENIE_USERNAME }}
          SKIPGENIE_PASSWORD: ${{ secrets.SKIPGENIE_PASSWORD }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python main.py

      - name: Commit updated state
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add pipeline_state.json
          git diff --cached --quiet || git commit -m "Update pipeline state [automated]"
          git push
